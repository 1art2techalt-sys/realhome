<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Requested Games</title>
    <style>
        /* --- Setup --- */
        html, body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: #000; color: white;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- Header --- */
        .main-header {
            font-size: 42px; font-weight: 900; letter-spacing: 2px;
            margin: 40px 0 10px 0; text-transform: uppercase;
            background: linear-gradient(#4facfe, #00f2fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .search-container { width: 90%; max-width: 600px; margin-bottom: 40px; }

        #gameSearch {
            width: 100%; padding: 15px 25px; border-radius: 30px;
            border: 2px solid rgba(79, 172, 254, 0.3);
            background: rgba(255, 255, 255, 0.05); color: white;
            font-size: 16px; outline: none; text-align: center;
        }

        /* --- Grid --- */
        .request-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px; width: 90%; max-width: 1000px; padding-bottom: 50px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(79, 172, 254, 0.3);
            border-radius: 12px; padding: 25px; text-align: center;
            display: flex; flex-direction: column; justify-content: center; min-height: 140px;
        }

        .hidden { display: none !important; }

        .card h3 { margin: 0 0 15px 0; font-size: 18px; text-transform: uppercase; }

        /* --- Buttons --- */
        .btn {
            background: #4facfe; color: #000; border: none;
            padding: 12px 20px; border-radius: 8px; font-weight: 800;
            cursor: pointer; text-transform: uppercase; font-size: 13px;
            text-decoration: none; display: inline-block;
        }

        .btn:hover { background: #00f2fe; transform: scale(1.05); }

        .form-card { background: rgba(79, 172, 254, 0.15); border: 2px dashed #4facfe; }
    </style>
</head>
<body>

    <h1 class="main-header">Requested Games</h1>

    <div class="search-container">
        <input type="text" id="gameSearch" placeholder="Search for a game..." onkeyup="filterGames()">
    </div>

    <div class="request-grid" id="gameGrid">
        <div class="card form-card">
            <h3>Request a Game</h3>
            <a href="https://forms.gle/xhWTy62fK1YqxNQA6" target="_blank" class="btn">Open Form</a>
        </div> 

        <div class="card">
            <h3>Bloxd.io</h3>
            <button class="btn" onclick="window.parent.launch('Bloxd', 'https://geometry.com.de/', 'https://geometry.com.de/favicon.ico', false)">Play Now</button>
        </div>

        <div class="card">
            <h3>Geometry Dash</h3>
            <button class="btn" onclick="window.parent.launch('Geometry Dash', 'https://gdl-dne.pages.dev', '', false)">Play Now</button>
        </div>

        <div class="card">
            <h3>UBG 1</h3>
            <button class="btn" onclick="window.parent.launch('UBG 1', 'https://ubg01.gitlab.io/', '', false)">Play Now</button>
        </div>

        <div class="card">
            <h3>Five Nights at Epstein's</h3>
            <button class="btn" onclick="window.parent.launch('FNAE', 'https://fivenightsatepsteins-f19.pages.dev', '', false)">Play Now</button>
        </div>

        <div class="card">
            <h3>Happy Wheels</h3>
            <button class="btn" onclick="window.parent.launch('Happy Wheels', 'https://happywheels-38v.pages.dev', '', false)">Play Now</button>
        </div>

        <div class="card">
            <h3>Buckshot Roulette</h3>
            <button class="btn" onclick="window.parent.launch('Buckshot', 'https://buckshot-roulette-6gv.pages.dev', '', false)">Play Now</button>
        </div>

        <div class="card">
            <h3>Pokerogue</h3>
            <button class="btn" onclick="window.parent.launch('Pokerogue', 'https://pokerogue-er3.pages.dev', '', false)">Play Now</button>
        </div>
    </div>

    <script>
        function filterGames() {
            let input = document.getElementById('gameSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
                if (title.includes(input)) {
                    cards[i].classList.remove('hidden');
                } else {
                    cards[i].classList.add('hidden');
                }
            }
        }
    </script>
</body>
</html>
