<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>testing</title>
    
    <link rel="icon" type="image/png" href="https://schoolissuperfun.github.io/logo.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- STABLE OVERLAY --- */
        #gameOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: none; 
            z-index: 10000;
        }

        /* The Close Button - Now directs back to Requested Games if applicable */
        .close-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 10001;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }
        .close-btn:hover { background: rgba(255, 255, 255, 0.4); }

        #gameFrame { width: 100%; height: 100%; border: none; }

        /* --- UI ELEMENTS --- */
        .panic-banner {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            padding: 5px 0;
            font-size: 0.9vw;
            font-weight: 600;
            z-index: 999;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 2fr; 
            height: 100vh;
            width: 100vw;
            gap: 15px; 
            padding: 40px 15px 15px 15px;
        }

        .nav-btn {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
            text-decoration: none;
            outline: none;
            overflow: hidden;
            font-size: 2.5vw; 
        }

        .games-main-btn { grid-column: 1; grid-row: 1; background: linear-gradient(135deg, #007cf0, #00dfd8); border-radius: 40px 15px 10px 15px; }
        .games-req-btn { grid-column: 1; grid-row: 2; background: linear-gradient(225deg, #4facfe, #00f2fe); border-radius: 10px 15px 40px 15px; }
        .proxies-btn { grid-column: 2; grid-row: 1 / span 2; background: linear-gradient(225deg, #ff4b2b, #ff416c); border-radius: 15px 40px 15px 40px; font-size: 3.5vw; }
        .tools-btn { grid-column: 1; grid-row: 3; background: linear-gradient(135deg, #7928ca, #ff0080); border-radius: 40px 15px 40px 15px; }

        .news-btn {
            grid-column: 2; grid-row: 3;
            background: #111; border: 2px solid #333;
            border-radius: 15px 40px 15px 40px; padding: 20px;
            cursor: default; display: flex; flex-direction: column; overflow: hidden;
        }

        .news-header { color: #4facfe; font-size: 1.3vw; margin-bottom: 8px; font-weight: 900; }
        .news-header a { color: #ff416c; text-decoration: underline; cursor: pointer; }
        .news-scroll-area { overflow-y: auto; flex-grow: 1; width: 100%; }
        .news-text { text-transform: none; font-weight: 400; font-size: 1.2vw; color: #ccc; line-height: 1.1; }

        .nav-btn:not(.news-btn):hover { filter: brightness(1.2); transform: scale(1.01); z-index: 10; }
        span { filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); pointer-events: none; padding: 10px; }
        .sub-text { font-size: 1.1vw; font-weight: 600; text-transform: none; display: block; margin-top: 5px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="gameOverlay">
        <button id="overlayCloseBtn" class="close-btn" onclick="closeGame()">Back to Home</button>
        <iframe id="gameFrame" src=""></iframe>
    </div>

    <div class="panic-banner">Updates weekly. Use the form for requests!</div>

    <div class="container">
        <button class="nav-btn games-main-btn" onclick="launch('Grades', 'https://games-4cz.pages.dev', 'https://realhome-74e.pages.dev/powerschool.png', false)">
            <span>Main Games</span>
        </button>

        <button class="nav-btn games-req-btn" onclick="launch('Classroom', 'https://requested-games-4jg.pages.dev', 'https://newhometesting.pages.dev/classroom.png', false)">
            <span>Requested Games<br><span class="sub-text">Games In News, Game Websites</span></span>
        </button>

        <button class="nav-btn proxies-btn" onclick="launch('Lewis Middle', 'https://proxies-6x8.pages.dev', 'https://newhometesting.pages.dev/lewis.png', false)">
            <span>Proxies</span>
        </button>

        <button class="nav-btn tools-btn" onclick="launch('Google Drive', 'https://movies-tools.pages.dev', 'https://newhometesting.pages.dev/googledrive.png', false)">
            <span>Movies and Tools</span>
        </button>

        <div class="nav-btn news-btn">
            <div class="news-header">NEWS (<a href="https://forms.gle/1PK3AMXTvXjHnrdq8" target="_blank">FORM</a>)</div>
            <div class="news-scroll-area">
                <div class="news-text">
                    3/27/26: Navigation overhauled. Closing a game now returns you to the grid!<br><br>
                    3/27/26: Added UBG sites and fixed Scramjet.
                </div>
            </div>
        </div>
    </div>

    <script>
        const originalTitle = document.title;
        const originalFavicon = "https://schoolissuperfun.github.io/logo.png";
        
        // This tracks if we are inside a "Sub-Page" (like Requested Games)
        let isInsideSubPage = false;
        const requestedGamesUrl = 'https://requested-games-4jg.pages.dev';

        function launch(disguiseTitle, url, favicon, inNewTab) {
            if (inNewTab) {
                const newWin = window.open('about:blank', '_blank');
                if (newWin) {
                    const content = `<html><head><title>${disguiseTitle}</title><link rel="icon" href="${favicon}"><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;}iframe{border:none;width:100%;height:100%;}</style></head><body><iframe src="${url}"></iframe></body></html>`;
                    newWin.document.write(content);
                    newWin.document.close();
                }
            } else {
                document.title = disguiseTitle;
                updateFavicon(favicon);

                const overlay = document.getElementById('gameOverlay');
                const frame = document.getElementById('gameFrame');
                const closeBtn = document.getElementById('overlayCloseBtn');
                
                // Logic: If the URL we are opening IS NOT the requested games grid, 
                // but the grid IS currently open in the background, change the button text
                if (url !== requestedGamesUrl && frame.src.includes('requested-games')) {
                    isInsideSubPage = true;
                    closeBtn.innerText = "Back to Requested Games";
                } else {
                    isInsideSubPage = false;
                    closeBtn.innerText = "Back to Home";
                }

                frame.src = url;
                overlay.style.display = 'block';
                window.history.pushState({view: 'game'}, disguiseTitle);
            }
        }

        function closeGame() {
            const overlay = document.getElementById('gameOverlay');
            const frame = document.getElementById('gameFrame');
            const closeBtn = document.getElementById('overlayCloseBtn');

            if (isInsideSubPage) {
                // Return to Requested Games Grid
                launch('Classroom', requestedGamesUrl, 'https://newhometesting.pages.dev/classroom.png', false);
            } else {
                // Return to Main Menu
                overlay.style.display = 'none';
                frame.src = ""; 
                document.title = originalTitle;
                updateFavicon(originalFavicon);
            }
        }

        function updateFavicon(url) {
            let link = document.querySelector("link[rel~='icon']");
            if (!link) {
                link = document.createElement('link');
                link.rel = 'icon';
                document.head.appendChild(link);
            }
            link.href = url;
        }

        window.onpopstate = function() { closeGame(); };

        window.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'q') {
                window.location.href = 'https://classroom.google.com';
            }
        });
    </script>
</body>
</html>
